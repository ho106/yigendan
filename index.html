<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
<title>衣跟单</title>

<style>
:root {
  --blue: #2f6df6;
  --green: #18a058;
  --orange: #ff7a1a;
  --red: #e5484d;
  --bg: #f5f6fa;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #7b8494;
  --line: #e9edf5;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  color: var(--text);
}

.app {
  max-width: 540px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 78px;
}

.header {
  position: sticky;
  top: 0;
  z-index: 9;
  background: #fff;
  padding: 16px;
  text-align: center;
  font-size: 22px;
  font-weight: 900;
  box-shadow: 0 2px 12px rgba(0,0,0,.05);
}

.page {
  display: none;
  padding: 16px;
}

.page.active {
  display: block;
}

.card {
  background: var(--card);
  border-radius: 18px;
  padding: 16px;
  margin: 14px 0;
  box-shadow: 0 8px 24px rgba(30,41,59,.06);
}

.title {
  font-size: 19px;
  font-weight: 900;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.sub {
  color: var(--muted);
  font-size: 13px;
}

.grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.stat {
  border-radius: 18px;
  color: #fff;
  padding: 18px;
  min-height: 112px;
}

.stat.blue {
  background: linear-gradient(135deg,#4a8bff,#245df0);
}

.stat.orange {
  background: linear-gradient(135deg,#ff9a2b,#ff4d0d);
}

.stat .num {
  font-size: 36px;
  font-weight: 900;
  margin: 8px 0;
}

.quick {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 8px;
  text-align: center;
}

.quick button {
  background: #fff;
  color: var(--text);
  border: 0;
  font-weight: 700;
}

.qicon {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 8px;
  font-size: 25px;
  background: #eef4ff;
  color: var(--blue);
}

label {
  font-size: 14px;
  font-weight: 800;
  display: block;
  margin-top: 6px;
}

input,
select,
textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #dbe1ea;
  border-radius: 12px;
  background: #fff;
  font-size: 15px;
  margin: 6px 0 12px;
}

textarea {
  min-height: 92px;
}

button {
  border: 0;
  border-radius: 12px;
  background: var(--blue);
  color: #fff;
  padding: 12px 14px;
  font-size: 15px;
  font-weight: 900;
  margin: 4px 0;
}

.btn-green {
  background: var(--green);
}

.btn-orange {
  background: var(--orange);
}

.btn-red {
  background: var(--red);
}

.btn-gray {
  background: #eef2f7;
  color: #1f2937;
}

.btn-small {
  padding: 7px 10px;
  font-size: 13px;
  border-radius: 10px;
}

.row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.row3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.item {
  background: #fafbfe;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
  margin: 10px 0;
}

.item:active {
  opacity: .75;
}

.tag {
  display: inline-block;
  border-radius: 999px;
  padding: 5px 10px;
  font-size: 12px;
  font-weight: 900;
}

.ok {
  background: #e8f8ef;
  color: #159957;
}

.warn {
  background: #fff2d6;
  color: #a96a00;
}

.bad {
  background: #ffe9ea;
  color: #d9363e;
}

.table-wrap {
  overflow: auto;
}

.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  min-width: 620px;
}

.table th,
.table td {
  border-bottom: 1px solid var(--line);
  padding: 8px 6px;
  text-align: left;
  vertical-align: top;
}

.table th {
  background: #fafafa;
  color: #6b7280;
}

.progress {
  height: 9px;
  background: #e9edf5;
  border-radius: 99px;
  overflow: hidden;
  margin: 8px 0;
}

.bar {
  height: 100%;
  background: var(--green);
}

.nav {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: #fff;
  border-top: 1px solid #e5e7eb;
  z-index: 10;
  display: flex;
  justify-content: center;
}

.nav-inner {
  max-width: 540px;
  width: 100%;
  display: grid;
  grid-template-columns: repeat(5,1fr);
}

.nav button {
  background: #fff;
  color: #8b95a5;
  border-radius: 0;
  padding: 8px 0;
  font-size: 12px;
}

.nav button.active {
  color: var(--blue);
}

.nav b {
  display: block;
  font-size: 22px;
  line-height: 22px;
}

.empty {
  color: #9aa2b1;
  text-align: center;
  padding: 20px;
}

.danger-text {
  color: var(--red);
  font-weight: 900;
}
</style>
</head>

<body>
<div class="app">
  <div class="header">衣跟单</div>

  <!-- 首页 -->
  <section id="home" class="page active">
    <div class="grid2">
      <div class="stat blue" onclick="showPage('orders')">
        <div>指令单</div>
        <div id="homeOrderCount" class="num">0</div>
        <div>点击查看生产任务</div>
      </div>

      <div class="stat orange" onclick="showPage('warning')">
        <div>缺料预警</div>
        <div id="homeWarnCount" class="num">0</div>
        <div>点击查看待采购物料</div>
      </div>
    </div>

    <div class="card">
      <div class="title">快捷操作</div>

      <div class="quick">
        <button onclick="showPage('orders')">
          <div class="qicon">＋</div>
          新建
        </button>

        <button onclick="showPage('stock')">
          <div class="qicon">↕</div>
          入库
        </button>

        <button onclick="showPage('products')">
          <div class="qicon">👕</div>
          产品
        </button>

        <button onclick="showPage('bom')">
          <div class="qicon">📦</div>
          物料
        </button>
      </div>
    </div>

    <div class="card">
      <div class="title">
        最近指令单
        <button class="btn-small btn-gray" onclick="showPage('orders')">全部</button>
      </div>
      <div id="homeOrders"></div>
    </div>
  </section>

  <!-- 指令单 -->
  <section id="orders" class="page">
    <div class="card">
      <div class="title">新建生产指令单</div>

      <label>选择货号</label>
      <select id="orderProduct" onchange="renderSizeInputs()"></select>

      <label>颜色</label>
      <input id="orderColor" placeholder="例如：粉色" />

      <div id="sizeInputs"></div>

      <button onclick="createOrder()">创建指令单并自动计算物料</button>
    </div>

    <div class="card">
      <div class="title">指令单列表</div>
      <div id="orderList"></div>
    </div>
  </section>

  <!-- 指令单详情 -->
  <section id="detail" class="page">
    <div id="detailBox"></div>
  </section>

  <!-- 缺料预警 -->
  <section id="warning" class="page">
    <div class="card">
      <div class="title">缺料预警</div>
      <div id="warningList"></div>
    </div>
  </section>

  <!-- 库存 -->
  <section id="stock" class="page">
    <div class="card">
      <div class="title">库存操作</div>

      <label>选择物料</label>
      <select id="stockMaterial"></select>

      <label>类型</label>
      <select id="stockType">
        <option value="in">采购到货入库</option>
        <option value="out">生产领料出库</option>
        <option value="onway">登记已下单未到</option>
      </select>

      <label>数量</label>
      <input id="stockQty" type="number" placeholder="请输入数量" />

      <label>备注</label>
      <input id="stockRemark" placeholder="例如：第一批到货" />

      <button class="btn-green" onclick="stockOperation()">提交操作</button>
    </div>

    <div class="card">
      <div class="title">库存总览</div>
      <input id="stockSearch" placeholder="搜索物料 / 规格" oninput="renderStock()" />
      <div id="stockList"></div>
    </div>
  </section>

  <!-- 产品 -->
  <section id="products" class="page">
    <div class="card">
      <div class="title">产品管理</div>

      <label>货号</label>
      <input id="pCode" placeholder="例如 A001" />

      <label>品名</label>
      <input id="pName" placeholder="例如 女童泳衣" />

      <label>尺码，用逗号分隔</label>
      <input id="p
