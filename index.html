<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衣跟单</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
  .container { max-width: 520px; margin: 0 auto; padding: 15px; }
  .title { font-size: 22px; font-weight: 700; text-align: center; margin: 10px 0 20px; }
  .cards { display: flex; gap: 15px; margin-bottom: 20px; }
  .card { 
    flex: 1; background: #fff; border-radius: 18px; padding: 20px 15px; 
    text-align: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: transform 0.1s;
  }
  .card:active { transform: scale(0.97); }
  .card-blue { background: #2d8cf0; color: #fff; }
  .card-orange { background: #ff792e; color: #fff; }
  .num { font-size: 38px; font-weight: 900; margin: 10px 0; }
  .label { font-size: 15px; opacity: 0.9; }
  .list { background: #fff; border-radius: 18px; padding: 15px; margin-bottom: 20px; }
  .list-title { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
  .item { padding: 12px 0; border-bottom: 1px solid #eee; }
  .item:last-child { border: none; }
  .order-id { font-weight: 600; font-size: 16px; }
  .order-desc { color: #666; font-size: 14px; margin-top: 4px; }
  .tag { display: inline-block; background: #fecaca; color: #e53e3e; font-size: 12px; padding: 2px 8px; border-radius: 12px; margin-top: 6px; }
  .tabs { display: flex; justify-content: space-around; background: #fff; border-top: 1px solid #eee; padding: 10px 0; position: fixed; bottom: 0; left: 0; right: 0; max-width: 520px; margin: 0 auto; }
  .tab { text-align: center; font-size: 12px; color: #666; cursor: pointer; }
  .tab-active { color: #2d8cf0; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="title">衣跟单</div>

  <!-- 这里的两个方块现在是可点击的 -->
  <div class="cards">
    <div class="card card-blue" onclick="alert('🚀 跳转指令单页面：展示所有生产任务详情')">
      <div class="label">指令单</div>
      <div class="num">1</div>
      <div class="label">生产任务</div>
    </div>
    <div class="card card-orange" onclick="alert('🚀 跳转缺料预警页面：展示需要采购的物料')">
      <div class="label">缺料预警</div>
      <div class="num">2</div>
      <div class="label">需要采购</div>
    </div>
  </div>

  <div class="list">
    <div class="list-title">最近指令单</div>
    <div class="item">
      <div class="order-id">ORD-20260101-001</div>
      <div class="order-desc">A001 女童泳衣·粉色·300件</div>
      <div class="order-desc">齐套率：33% · 预警：2</div>
      <div class="tag">待处理</div>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab tab-active">首页</div>
  <div class="tab" onclick="alert('📄 切换到：指令单页面')">指令单</div>
  <div class="tab" onclick="alert('📦 切换到：库存页面')">库存</div>
  <div class="tab" onclick="alert('👕 切换到：产品页面')">产品</div>
  <div class="tab" onclick="alert('📊 切换到：报表页面')">报表</div>
</div>

</body>
</html>
