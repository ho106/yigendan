<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>衣跟单 V4 稳定实用版</title>
<style>
:root{
  --blue:#2f6df6;--green:#18a058;--orange:#ff7a1a;--red:#e5484d;
  --bg:#f5f6fa;--card:#fff;--text:#1f2937;--muted:#7b8494;--line:#e9edf5;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text)}
.app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:82px}
.header{position:sticky;top:0;z-index:9;background:#fff;padding:16px;text-align:center;font-size:22px;font-weight:900;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.page{display:none;padding:16px}.page.active{display:block}
.card{background:#fff;border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 8px 24px rgba(30,41,59,.06)}
.title{font-size:19px;font-weight:900;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}

.stat{border-radius:18px;color:#fff;padding:18px;min-height:112px}.blue{background:linear-gradient(135deg,#4a8bff,#245df0)}.orange{background:linear-gradient(135deg,#ff9a2b,#ff4d0d)}.green{background:linear-gradient(135deg,#28c76f,#159957)}.red{background:linear-gradient(135deg,#ff6b6b,#d9363e)}

.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}.table th,.table td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:left;vertical-align:top}.table th{background:#fafafa;color:#6b7280}

.nav button{background:#fff;color:#8b95a5;border-radius:0;padding:8px 0;font-size:12px}.nav button.active{color:var(--blue)}.nav b{display:block;font-size:22px;line-height:22px}

<body>
<div class="app">
  <div class="header">衣跟单 V4</div>

  <section id="home" class="page active">
    <div class="grid2">
      <div class="stat blue" onclick="showPage('orders')"><div>进行中指令单</div><div id="homeActiveCount" class="num">0</div><div>点击查看生产任务</div></div>
      <div class="stat orange" onclick="showPage('warning')"><div>缺料预警</div><div id="homeWarnCount" class="num">0</div><div>点击查看采购建议</div></div>
    </div>
    <div class="card">
      <div class="title">快捷操作</div>
      <div class="quick">
        <button onclick="showPage('orders')"><div class="qicon">＋</div>新建</button>
        <button onclick="showPage('stock')"><div class="qicon">↕</div>入库</button>
        <button onclick="showPage('products')"><div class="qicon">👕</div>产品</button>
        <button onclick="showPage('bom')"><div class="qicon">📦</div>物料</button>
      </div>
    </div>
    <div class="card"><div class="title">最近指令单 <button class="btn-small btn-gray" onclick="showPage('orders')">全部</button></div><div id="homeOrders"></div></div>
  </section>

  <section id="orders" class="page">
    <div class="card">
      <div class="title">新建生产指令单</div>
      <label>选择货号</label><select id="orderProduct" onchange="renderSizeInputs()"></select>
      <label>颜色</label><input id="orderColor" placeholder="例如：粉色">
      <div id="sizeInputs"></div>
      <button onclick="createOrder()">创建指令单并锁定当前 BOM</button>
      <div class="sub">V4说明：创建指令单时会保存一份 BOM 快照，后续修改 BOM 不会影响旧指令单。</div>
    </div>
    <div class="card">
      <div class="title">指令单列表</div>
      <select id="orderFilter" onchange="renderOrders()">
        <option value="active">只看进行中</option>
        <option value="all">全部</option>
        <option value="completed">已完成</option>
        <option value="cancelled">已取消</option>
      </select>
      <div id="orderList"></div>
    </div>
  </section>

  <section id="detail" class="page"><div id="detailBox"></div></section>

  <section id="warning" class="page">
    <div class="card">
      <div class="title">采购建议 / 缺料汇总</div>
      <div class="sub">只统计“进行中”的指令单。按物料+规格合并总需求，避免同一库存被多个订单重复误判。</div>
      <div id="purchaseList"></div>
    </div>
    <div class="card"><div class="title">逐单缺料明细</div><div id="warningList"></div></div>
  </section>

  <section id="stock" class="page">
    <div class="card">
      <div class="title">库存操作</div>
      <label>选择物料</label><select id="stockMaterial"></select>
      <label>类型</label>
      <select id="stockType">
        <option value="in">采购到货入库</option>
        <option value="out">生产领料出库</option>
        <option value="onway">登记已下单未到</option>
      </select>
      <label>关联指令单（出库时建议选择）</label><select id="stockOrder"></select>
      <label>数量</label><input id="stockQty" type="number" placeholder="请输入数量">
      <label>备注</label><input id="stockRemark" placeholder="例如：第一批到货 / 某工单领料">
      <button class="btn-green" onclick="stockOperation()">提交操作</button>
    </div>
    <div class="card">
      <div class="title">库存总览</div>
      <input id="stockSearch" placeholder="搜索物料/规格" oninput="renderStock()">
      <div id="stockList"></div>
    </div>
    <div class="card"><div class="title">最近库存流水</div><div id="logList"></div></div>
  </section>

  <section id="products" class="page">
    <div class="card">
      <div class="title">产品管理</div>
      <label>货号</label><input id="pCode" placeholder="例如 A001">
      <label>品名</label><input id="pName" placeholder="例如 女童泳衣">
      <label>尺码，用逗号分隔</label><input id="pSizes" placeholder="例如 S,M,L,XL">
      <label>颜色，用逗号分隔</label><input id="pColors" placeholder="例如 粉色,蓝色">
      <button onclick="addProduct()">保存产品</button>
    </div>
    <div class="card"><div class="title">产品列表</div><div id="productList"></div></div>
  </section>

  <section id="bom" class="page">
    <div class="card">
      <div class="title">物料 BOM</div>
      <label>所属货号</label><select id="bomProduct"></select>
      <label>物料名称</label><input id="bomName" placeholder="例如 面料">
      <label>规格</label><input id="bomSpec" placeholder="例如 粉色涤纶">
      <div class="row3">
        <div><label>单件用量</label><input id="bomUsage" type="number" placeholder="1.2"></div>
        <div><label>单价</label><input id="bomPrice" type="number" placeholder="15"></div>
        <div><label>单位</label><input id="bomUnit" placeholder="米"></div>
      </div>
      <button class="btn-orange" onclick="addBom()">保存物料</button>
    </div>
    <div class="card"><div class="title">物料清单</div><div id="bomList"></div></div>
  </section>

  <section id="report" class="page">
    <div class="card">
      <div class="title">报表 / 数据</div>
      <button onclick="exportOrderCSV()">导出指令单明细 CSV</button>
      <button class="btn-green" onclick="exportPurchaseCSV()">导出采购建议 CSV</button>
      <button class="btn-gray" onclick="backupData()">备份数据</button>
      <button class="btn-orange" onclick="restoreData()">导入备份</button>
      <button class="btn-red" onclick="resetDemo()">恢复演示数据</button>
      <textarea id="backupBox" placeholder="备份数据会显示在这里；导入时把备份内容粘贴到这里"></textarea>
      <div class="sub">当前版本数据保存在本手机浏览器里。换手机或清理浏览器数据会丢失，正式版需要接微信云开发数据库。</div>
    </div>
  </section>
</div>

<div class="nav"><div class="nav-inner">
  <button data-nav="home" class="active" onclick="showPage('home')"><b>▦</b>首页</button>
  <button data-nav="orders" onclick="showPage('orders')"><b>▤</b>指令单</button>
  <button data-nav="stock" onclick="showPage('stock')"><b>□</b>库存</button>
  <button data-nav="products" onclick="showPage('products')"><b>👕</b>产品</button>
  <button data-nav="report" onclick="showPage('report')"><b>◔</b>报表</button>
</div></div>

<script>
const STORAGE_KEY = "yigendan_v4_stable";

function $(id){ return document.getElementById(id); }

function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, function(s){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s];
  });
}

function uid(prefix){
  return prefix + "-" + Date.now() + "-" + Math.floor(Math.random()*1000);
}

function safeNumber(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultData();
    const obj = JSON.parse(raw);
    if(!obj.products || !obj.boms || !obj.stocks || !obj.orders) return defaultData();
    obj.logs = obj.logs || [];
    return obj;
  }catch(e){
    alert("本地数据损坏，已自动恢复演示数据");
    return defaultData();
  }
}

function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }catch(e){
    alert("保存失败：浏览器本地存储空间不足，请先备份并清理数据");
  }
}

function defaultData(){
  return {
    products:[
      {id:uid("P"),code:"A001",name:"女童泳衣",sizes:["S","M","L","XL"],colors:["粉色","蓝色"]}
    ],
    boms:[
      {id:uid("B"),code:"A001",name:"面料",spec:"粉色涤纶",usage:1.2,price:15,unit:"米"},
      {id:uid("B"),code:"A001",name:"拉链",spec:"30cm",usage:1,price:1.5,unit:"条"},
      {id:uid("B"),code:"A001",name:"吊牌",spec:"通用",usage:1,price:0.2,unit:"个"}
    ],
    stocks:[
      {id:uid("S"),name:"面料",spec:"粉色涤纶",stock:200,onway:100,unit:"米"},
      {id:uid("S"),name:"拉链",spec:"30cm",stock:400,onway:0,unit:"条"},
      {id:uid("S"),name:"吊牌",spec:"通用",stock:100,onway:100,unit:"个"}
    ],
    orders:[],
    logs:[]
  };
}

let data = loadData();

if(!data.orders.length){
  data.orders.push(createOrderObject("A001","粉色",{S:50,M:100,L:100,XL:50},"ORD-20260101-001"));
  saveData();
}

function getProduct(code){
  return data.products.find(p => p.code === code);
}

function getBoms(code){
  return data.boms.filter(b => b.code === code);
}

function stockKey(name,spec){
  return name + "||" + spec;
}

function getStockByMaterial(name,spec){
  return data.stocks.find(s => s.name === name && s.spec === spec) || {stock:0,onway:0,unit:""};
}

function snapshotBoms(code){
  return getBoms(code).map(b => ({
    bom_id:b.id,
    code:b.code,
    name:b.name,
    spec:b.spec,
    usage:safeNumber(b.usage),
    price:safeNumber(b.price),
    unit:b.unit
  }));
}

function calcStatus(totalNeed,currentStock,onway){
  totalNeed=safeNumber(totalNeed);currentStock=safeNumber(currentStock);onway=safeNumber(onway);
  if(currentStock>=totalNeed) return {need:0,status:"齐套",cls:"ok"};
  if(currentStock+onway>=totalNeed) return {need:0,status:"部分在途",cls:"warn"};
  return {need:Number((totalNeed-currentStock-onway).toFixed(2)),status:"待采购",cls:"bad"};
}

function createOrderObject(code,color,sizeMap,id){
  const product = getProduct(code) || {name:"未知产品"};
  const totalQty = Object.values(sizeMap || {}).reduce((sum,val)=>sum+safeNumber(val),0);
  const bomSnapshot = snapshotBoms(code);
  return {
    id:id || "ORD-" + Date.now(),
    code,
    product_name:product.name,
    color,
    sizeMap,
    total_qty:totalQty,
    status:"active",
    created:new Date().toISOString().slice(0,10),
    bomSnapshot,
    issued:{},
    materials:[]
  };
}

function calcOrderMaterials(order){
  const materials = (order.bomSnapshot || []).map(bom => {
    const st = getStockByMaterial(bom.name,bom.spec);
    const totalNeed = Number((safeNumber(bom.usage)*safeNumber(order.total_qty)).toFixed(2));
    const issuedQty = safeNumber((order.issued || {})[stockKey(bom.name,bom.spec)]);
    const remainNeedAfterIssue = Math.max(0, Number((totalNeed - issuedQty).toFixed(2)));
    const result = order.status === "active"
      ? calcStatus(remainNeedAfterIssue, safeNumber(st.stock), safeNumber(st.onway))
      : {need:0,status:order.status === "completed" ? "已完成" : "已取消",cls:"gray"};

    return {
      ...bom,
      total_need:totalNeed,
      issued_qty:issuedQty,
      remain_need:remainNeedAfterIssue,
      current_stock:safeNumber(st.stock),
      ordered_on_way:safeNumber(st.onway),
      need_order:result.need,
      status:result.status,
      cls:result.cls,
      cost:Number((totalNeed*safeNumber(bom.price)).toFixed(2))
    };
  });

  const readyCount = materials.filter(m => m.status === "齐套" || m.status === "已完成").length;
  const readyRate = materials.length ? Math.round((readyCount / materials.length) * 100) : 0;
  const warningCount = order.status === "active" ? materials.filter(m => m.status !== "齐套").length : 0;

  return {...order,materials,ready_rate:readyRate,warning_count:warningCount};
}

function recalcOrders(){
  data.orders = data.orders.map(calcOrderMaterials);
  saveData();
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  $(id).classList.add("active");
  document.querySelectorAll(".nav button").forEach(btn=>btn.classList.toggle("active",btn.dataset.nav===id));
  renderAll();
  window.scrollTo(0,0);
}

function renderAll(){
  recalcOrders();
  renderSelects();
  renderHome();
  renderOrders();
  renderStock();
  renderProducts();
  renderBom();
  renderWarnings();
  renderLogs();
}

function renderSelects(){
  const productOptions = data.products.map(p=>`<option value="${esc(p.code)}">${esc(p.code)} - ${esc(p.name)}</option>`).join("");
  $("orderProduct").innerHTML = productOptions;
  $("bomProduct").innerHTML = productOptions;

  $("stockMaterial").innerHTML = data.stocks.map((s,i)=>`<option value="${i}">${esc(s.name)} / ${esc(s.spec)}</option>`).join("");

  const orderOptions = [`<option value="">不关联指令单</option>`].concat(
    data.orders.filter(o=>o.status==="active").map(o=>`<option value="${esc(o.id)}">${esc(o.id)} - ${esc(o.product_name)}</option>`)
  ).join("");
  $("stockOrder").innerHTML = orderOptions;

  renderSizeInputs();
}

function renderSizeInputs(){
  const p = getProduct($("orderProduct").value);
  if(!p){ $("sizeInputs").innerHTML = `<div class="empty">请先添加产品</div>`; return; }
  $("sizeInputs").innerHTML = `<div class="title" style="font-size:16px">尺码数量</div>` + p.sizes.map(s=>`
    <label>${esc(s)}</label>
    <input class="sizeQty" data-size="${esc(s)}" type="number" placeholder="${esc(s)} 数量">
  `).join("");
}

function renderHome(){
  const activeOrders = data.orders.filter(o=>o.status==="active");
  $("homeActiveCount").innerText = activeOrders.length;
  $("homeWarnCount").innerText = getPurchaseSummary().reduce((sum,x)=>sum+(x.need_order>0?1:0),0);
  $("homeOrders").innerHTML = data.orders.slice().reverse().slice(0,5).map(orderCard).join("") || `<div class="empty">暂无指令单</div>`;
}

function orderStatusTag(order){
  if(order.status==="completed") return `<span class="tag ok">已完成</span>`;
  if(order.status==="cancelled") return `<span class="tag gray">已取消</span>`;
  return `<span class="tag ${order.warning_count ? "warn" : "ok"}">${order.warning_count ? "进行中-待处理" : "进行中-齐套"}</span>`;
}

function orderCard(order){
  return `
    <div class="item" onclick="openOrder('${esc(order.id)}')">
      <div class="item-head">
        <div><b>${esc(order.id)}</b></div>
        ${orderStatusTag(order)}
      </div>
      <span>${esc(order.code)} ${esc(order.product_name)} · ${esc(order.color)} · ${order.total_qty}件</span>
      <div class="progress"><div class="bar" style="width:${order.ready_rate || 0}%"></div></div>
      齐套率：${order.ready_rate || 0}%　预警：${order.warning_count || 0}
    </div>
  `;
}

function createOrder(){
  const code = $("orderProduct").value;
  const color = $("orderColor").value.trim();
  const sizeMap = {};
  document.querySelectorAll(".sizeQty").forEach(input=>{
    sizeMap[input.dataset.size] = safeNumber(input.value);
  });
  const totalQty = Object.values(sizeMap).reduce((a,b)=>a+b,0);

  if(!code || !color || totalQty<=0){ alert("请填写货号、颜色和尺码数量"); return; }
  if(!getBoms(code).length){ alert("该货号还没有物料 BOM，请先去“物料”页面添加物料"); return; }

  data.orders.push(createOrderObject(code,color,sizeMap));
  saveData();
  $("orderColor").value = "";
  renderAll();
  alert("指令单创建成功，并已锁定当前 BOM 快照");
  showPage("orders");
}

function renderOrders(){
  const f = $("orderFilter").value;
  let list = data.orders.slice().reverse();
  if(f !== "all") list = list.filter(o=>o.status===f);
  $("orderList").innerHTML = list.map(orderCard).join("") || `<div class="empty">暂无指令单</div>`;
}

function openOrder(id){
  const order = data.orders.find(o=>o.id===id);
  if(!order) return;

  const sizeRows = Object.entries(order.sizeMap).map(([s,q])=>`<tr><td>${esc(s)}</td><td>${q}</td></tr>`).join("");
  const materialRows = (order.materials || []).map(m=>`
    <tr>
      <td>${esc(m.name)}<br><span class="sub">${esc(m.spec)}</span></td>
      <td>${m.total_need}</td>
      <td>${m.issued_qty || 0}</td>
      <td>${m.remain_need}</td>
      <td>${m.current_stock}</td>
      <td>${m.ordered_on_way}</td>
      <td>${m.need_order}</td>
      <td><span class="tag ${m.cls}">${m.status}</span></td>
      <td>${m.cost}</td>
    </tr>
  `).join("");

  $("detailBox").innerHTML = `
    <div class="card">
      <div class="title">${esc(order.id)} <button class="btn-small btn-gray" onclick="showPage('orders')">返回</button></div>
      ${esc(order.code)} - ${esc(order.product_name)}<br>
      颜色：${esc(order.color)}　总数：${order.total_qty}件<br>
      状态：${orderStatusTag(order)}<br>
      齐套率：${order.ready_rate || 0}%　预警：${order.warning_count || 0}
      <hr>
      <button class="btn-green btn-small" onclick="setOrderStatus('${esc(order.id)}','completed')">标记完成</button>
      <button class="btn-orange btn-small" onclick="setOrderStatus('${esc(order.id)}','active')">恢复进行中</button>
      <button class="btn-gray btn-small" onclick="setOrderStatus('${esc(order.id)}','cancelled')">取消指令单</button>
      <button class="btn-red btn-small" onclick="deleteOrder('${esc(order.id)}')">删除</button>
    </div>
    <div class="card"><div class="title">尺码配比</div><div class="table-wrap"><table class="table" style="min-width:0"><tr><th>尺码</th><th>数量</th></tr>${sizeRows}</table></div></div>
    <div class="card"><div class="title">物料明细（BOM快照）</div><div class="table-wrap"><table class="table">

      ${materialRows}
    </table></div></div>
  `;
  showPage("detail");
}

function setOrderStatus(id,status){
  const o = data.orders.find(x=>x.id===id);
  if(!o) return;
  o.status = status;
  saveData();
  renderAll();
  openOrder(id);
}

function deleteOrder(id){
  if(!confirm("确定删除这个指令单？")) return;
  data.orders = data.orders.filter(o=>o.id!==id);
  saveData();
  renderAll();
  showPage("orders");

function stockOperation(){
  const idx = Number($("stockMaterial").value);
  const qty = safeNumber($("stockQty").value);
  const type = $("stockType").value;
  const orderId = $("stockOrder").value;
  const stock = data.stocks[idx];

  if(!stock || qty <= 0){ alert("请选择物料并填写正确数量"); return; }

  if(type === "in"){
    stock.stock = Number((safeNumber(stock.stock)+qty).toFixed(2));
    stock.onway = Math.max(0, Number((safeNumber(stock.onway)-qty).toFixed(2)));
  }

  if(type === "out"){
    if(safeNumber(stock.stock) < qty){ alert("库存不足，不能出库"); return; }
    stock.stock = Number((safeNumber(stock.stock)-qty).toFixed(2));

    if(orderId){
      const order = data.orders.find(o=>o.id===orderId);
      if(order){
        order.issued = order.issued || {};
        const k = stockKey(stock.name,stock.spec);
        order.issued[k] = Number((safeNumber(order.issued[k])+qty).toFixed(2));
      }
    }
  }

  if(type === "onway"){
    stock.onway = Number((safeNumber(stock.onway)+qty).toFixed(2));
  }

  data.logs.push({
    id:uid("L"),
    date:new Date().toLocaleString(),
    name:stock.name,
    spec:stock.spec,
    type,
    qty,
    orderId,
    remark:$("stockRemark").value || ""
  });

  saveData();
  $("stockQty").value = "";
  $("stockRemark").value = "";
  renderAll();
  alert("库存操作成功，指令单和采购建议已重新计算");
}

function renderStock(){
  const kw = $("stockSearch").value.trim();
  const list = data.stocks.filter(s=>!kw || s.name.includes(kw) || s.spec.includes(kw));

  $("stockList").innerHTML = list.map((s,i)=>`
    <div class="item">
      <div class="item-head"><b>${esc(s.name)}</b><span class="tag gray">${esc(s.unit)}</span></div>
      规格：${esc(s.spec)}<br>
      当前库存：${s.stock}${esc(s.unit)}<br>
      已下单未到：${s.onway}${esc(s.unit)}<br>
      <button class="btn-small btn-gray" onclick="editStock(${data.stocks.indexOf(s)})">编辑库存</button>
    </div>
  `).join("") || `<div class="empty">暂无库存</div>`;
}

function editStock(index){
  const s = data.stocks[index];
  const stock = prompt("当前库存", s.stock);
  if(stock===null) return;
  const onway = prompt("已下单未到", s.onway);
  if(onway===null) return;
  s.stock = Math.max(0,safeNumber(stock));
  s.onway = Math.max(0,safeNumber(onway));
  saveData();
  renderAll();
}

function renderLogs(){
  const typeMap = {in:"入库",out:"出库",onway:"在途"};
  $("logList").innerHTML = data.logs.slice().reverse().slice(0,20).map(l=>`

      <b>${esc(typeMap[l.type] || l.type)}</b>　${esc(l.name)} / ${esc(l.spec)}<br>

function addProduct(){
  const code = $("pCode").value.trim();
  const name = $("pName").value.trim();
  const sizes = $("pSizes").value.split(",").map(x=>x.trim()).filter(Boolean);
  const colors = $("pColors").value.split(",").map(x=>x.trim()).filter(Boolean);

  if(!code || !name || !sizes.length){ alert("请填写货号、品名和尺码"); return; }
  if(data.products.some(p=>p.code===code)){ alert("货号已存在"); return; }

  data.products.push({id:uid("P"),code,name,sizes,colors});
  saveData();
  $("pCode").value = $("pName").value = $("pSizes").value = $("pColors").value = "";
  renderAll();
  alert("产品保存成功");
}

function renderProducts(){
  $("productList").innerHTML = data.products.map(p=>`
    <div class="item">
      <div class="item-head"><b>${esc(p.code)}</b><span class="tag gray">${esc(p.name)}</span></div>
      尺码：${p.sizes.map(esc).join("、")}<br>
      颜色：${(p.colors || []).map(esc).join("、")}<br>

  `).join("") || `<div class="empty">暂无产品</div>`;
}

function deleteProduct(code){
  if(data.orders.some(o=>o.code===code)){
    alert("该货号已有指令单，不能直接删除。可先取消/删除对应指令单。");
    return;
  }
  if(!confirm("确定删除产品？对应 BOM 也会删除。")) return;
  data.products = data.products.filter(p=>p.code!==code);
  data.boms = data.boms.filter(b=>b.code!==code);
  saveData();
  renderAll();
}

function addBom(){
  const item = {
    id:uid("B"),
    code:$("bomProduct").value,
    name:$("bomName").value.trim(),
    spec:$("bomSpec").value.trim(),
    usage:safeNumber($("bomUsage").value),
    price:safeNumber($("bomPrice").value),
    unit:$("bomUnit").value.trim() || "个"
  };

  if(!item.code || !item.name || !item.spec || item.usage <= 0){ alert("请填写完整物料信息"); return; }

  data.boms.push(item);

  if(!data.stocks.some(s=>s.name===item.name && s.spec===item.spec)){
    data.stocks.push({id:uid("S"),name:item.name,spec:item.spec,stock:0,onway:0,unit:item.unit});
  }

  saveData();
  $("bomName").value = $("bomSpec").value = $("bomUsage").value = $("bomPrice").value = $("bomUnit").value = "";
  renderAll();
  alert("物料保存成功");

function renderBom(){
  $("bomList").innerHTML = data.boms.map(b=>`
    <div class="item">
      <div class="item-head"><b>${esc(b.name)}</b><span class="tag gray">${esc(b.code)}</span></div>
      规格：${esc(b.spec)}<br>
      单耗：${b.usage}${esc(b.unit)}　单价：${b.price}<br>

function editBom(id){
  const b = data.boms.find(x=>x.id===id);
  if(!b) return;
  const usage = prompt("单件用量", b.usage);
  if(usage===null) return;
  const price = prompt("单价", b.price);

  b.usage = Math.max(0,safeNumber(usage));
  b.price = Math.max(0,safeNumber(price));
  saveData();

}

function deleteBom(id){
  if(!confirm("确定删除这个 BOM 物料？已创建指令单不受影响。")) return;
  data.boms = data.boms.filter(b=>b.id!==id);
  saveData();
  renderAll();
}

function getPurchaseSummary(){
  const map = {};
  data.orders.filter(o=>o.status==="active").forEach(o=>{
    (o.materials || []).forEach(m=>{
      const k = stockKey(m.name,m.spec);
      if(!map[k]){
        const st = getStockByMaterial(m.name,m.spec);
        map[k] = {name:m.name,spec:m.spec,unit:m.unit,total_need:0,stock:safeNumber(st.stock),onway:safeNumber(st.onway),need_order:0};
      }
      map[k].total_need += safeNumber(m.remain_need);
    });
  });

  Object.values(map).forEach(x=>{
    x.total_need = Number(x.total_need.toFixed(2));
    x.need_order = Math.max(0, Number((x.total_need - x.stock - x.onway).toFixed(2)));
  });

  return Object.values(map).filter(x=>x.need_order>0).sort((a,b)=>b.need_order-a.need_order);
}

function renderWarnings(){
  const summary = getPurchaseSummary();

  $("purchaseList").innerHTML = summary.map(x=>`

      进行中总需求：${x.total_need}${esc(x.unit)}<br>

      建议采购：<span class="danger-text">${x.need_order}</span>${esc(x.unit)}
    </div>
  `).join("") || `<div class="empty">暂无采购建议，进行中订单物料齐套</div>`;

  const rows = [];
  data.orders.filter(o=>o.status==="active").forEach(o=>{
    (o.materials || []).filter(m=>m.status!=="齐套").forEach(m=>{
      rows.push({...m,order_id:o.id,product:o.product_name,color:o.color});
    });
  });

  $("warningList").innerHTML = rows.map(row=>`
    <div class="item">
      <b>${esc(row.order_id)}</b><br>
      ${esc(row.product)} · ${esc(row.color)}<br>
      物料：${esc(row.name)} / ${esc(row.spec)}<br>
      还需下单：<span class="danger-text">${row.need_order}</span>${esc(row.unit)}<br>

}

function exportOrderCSV(){
  const rows = [["指令单","状态","货号","品名","颜色","总数量","齐套率","预警数","物料","规格","总需用","已领","剩余需求","库存","在途","还需","状态","成本"]];

function exportPurchaseCSV(){
  const rows = [["物料","规格","单位","进行中总需求","库存","在途","建议采购"]];
  getPurchaseSummary().forEach(x=>rows.push([x.name,x.spec,x.unit,x.total_need,x.stock,x.onway,x.need_order]));
  downloadCSV("衣跟单采购建议.csv",rows);
}

function downloadCSV(filename,rows){
  const csv = rows.map(row=>row.map(v=>`"${String(v ?? "").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
}

    data = obj;
    saveData();

    alert("导入失败：备份内容格式不对");
  }
}
