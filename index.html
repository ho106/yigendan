<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>衣跟单演示版</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f5f8;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial;color:#1f2937}.app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:80px}.header{height:70px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;box-shadow:0 2px 10px rgba(0,0,0,.04);position:sticky;top:0;z-index:5}.page{display:none;padding:16px}.page.active{display:block}.title{text-align:center;font-size:28px;font-weight:900;margin:10px 0 20px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px}.stat{border-radius:18px;color:#fff;padding:20px}.blue{background:linear-gradient(135deg,#4a8bff,#2461f2)}.orange{background:linear-gradient(135deg,#ff8b1c,#ff4d0d)}.stat .num{font-size:40px;font-weight:900;margin:10px 0}.card{background:#fff;border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 8px 24px rgba(0,0,0,.06)}.card-title{font-size:20px;font-weight:900;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}.quick button{border:0;background:transparent;font-size:13px}.icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:26px}.i1{background:#eef5ff;color:#2f6df6}.i2{background:#effbf3;color:#18a558}.i3{background:#fbf1ff;color:#a13ee8}.i4{background:#fff4ec;color:#f46b20}.order{background:#fafbfe;border:1px solid #edf0f5;border-radius:14px;padding:14px;margin:10px 0;display:flex;justify-content:space-between;gap:10px}.order strong{font-size:17px}.muted{color:#7b8494;font-size:13px}.tag{border-radius:999px;padding:6px 10px;font-weight:800;font-size:13px;white-space:nowrap}.ok{background:#eaf8f0;color:#119b59}.warn{background:#fff2d6;color:#b87800}.danger{background:#ffe9ea;color:#d9363e}.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8ebf0;display:flex;justify-content:center}.tabs-inner{max-width:520px;width:100%;display:grid;grid-template-columns:repeat(5,1fr)}.tab{height:68px;border:0;background:#fff;color:#9aa2b1;font-size:12px}.tab b{display:block;font-size:23px}.tab.active{color:#2f6df6;font-weight:800}input,select{width:100%;border:1px solid #dfe3eb;border-radius:12px;padding:13px;font-size:16px;margin:6px 0 14px;background:#fff}label{font-weight:800;font-size:14px}.btn{width:100%;border:0;border-radius:14px;padding:14px;font-size:17px;font-weight:900;background:#2f6df6;color:#fff;margin:8px 0}.btn.green{background:#22b573}.btn.orange{background:#ff681f}.btn.gray{background:#eef2f7;color:#1f2937}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid #edf0f5;padding:8px 5px;text-align:left}.table th{background:#fafafa;color:#6b7280}.progress{height:9px;background:#e9edf5;border-radius:99px;overflow:hidden;margin-top:8px}.bar{height:100%;background:#22b573}.small-btn{border:0;border-radius:10px;padding:7px 10px;background:#eef2ff;color:#2f6df6;font-weight:800}.empty{text-align:center;color:#9aa2b1;padding:26px}
</style>
</head>
<body>
<div class="app">
<div class="header">衣跟单</div>

<section id="home" class="page active">
<div class="title">衣跟单</div>
<div class="stats">
<div class="stat blue"><div>待齐套指令单</div><div id="pendingCount" class="num">0</div><div>需关注物料齐套</div></div>
<div class="stat orange"><div>缺料预警</div><div id="warnCount" class="num">0</div><div>物料库存不足</div></div>
</div>
<div class="card">
<div class="card-title">快捷操作</div>
<div class="quick">
<button onclick="showPage('create')"><div class="icon i1">＋</div>新建</button>
<button onclick="showPage('stock')"><div class="icon i2">🚚</div>入库</button>
<button onclick="showPage('products')"><div class="icon i3">👕</div>产品</button>
<button onclick="showPage('materials')"><div class="icon i4">📦</div>物料</button>
</div>
</div>
<div class="card"><div class="card-title">最近指令单 <button class="small-btn" onclick="showPage('orders')">查看全部</button></div><div id="recentOrders"></div></div>
</section>

<section id="orders" class="page"><div class="card-title">指令单列表</div><div id="ordersList"></div></section>

<section id="create" class="page">
<div class="card">
<div class="card-title">新建指令单</div>
<label>选择产品</label><select id="orderProduct" onchange="renderSizeInputs()"></select>
<label>颜色</label><input id="orderColor" placeholder="例如：粉色">
<div id="sizeInputs"></div>
<button class="btn" onclick="createOrder()">创建指令单</button>
</div>
</section>

<section id="inventory" class="page">
<div class="card-title">物料库存</div>
<input id="searchMat" placeholder="搜索物料" oninput="renderInventory()">
<div id="inventoryList"></div>
</section>

<section id="stock" class="page">
<div class="card">
<div class="card-title">入库 / 出库 / 在途</div>
<label>选择物料</label><select id="stockMaterial"></select>
<label>操作类型</label>
<select id="stockType">
<option value="in">采购到货入库</option>
<option value="out">生产领料出库</option>
<option value="onway">已下单未到</option>
</select>
<label>数量</label><input id="stockQty" type="number" placeholder="请输入数量">
<label>备注</label><input id="stockRemark" placeholder="例如：第一批到货">
<button class="btn green" onclick="stockOperation()">确认提交</button>
</div>
</section>

<section id="products" class="page">
<div class="card">
<div class="card-title">产品管理</div>
<label>货号</label><input id="pCode" placeholder="例如 A001">
<label>品名</label><input id="pName" placeholder="例如 女童泳衣">
<label>尺码，用逗号分隔</label><input id="pSizes" placeholder="S,M,L,XL">
<button class="btn" onclick="addProduct()">保存产品</button>
</div>
<div id="productList"></div>
</section>

<section id="materials" class="page">
<div class="card">
<div class="card-title">新增物料 BOM</div>
<label>所属产品</label><select id="mProduct"></select>
<label>物料名</label><input id="mName" placeholder="例如 面料">
<label>规格</label><input id="mSpec" placeholder="例如 粉色涤纶">
<div class="row"><div><label>单件用量</label><input id="mUsage" type="number" placeholder="1.2"></div><div><label>单价</label><input id="mPrice" type="number" placeholder="15"></div></div>
<label>单位</label><input id="mUnit" placeholder="米/个/码">
<button class="btn orange" onclick="addMaterial()">保存物料</button>
</div>
<div id="materialList"></div>
</section>

<section id="reports" class="page">
<div class="card">
<div class="card-title">报表</div>
<button class="btn" onclick="exportCSV()">导出 CSV 表格</button>
<button class="btn gray" onclick="resetDemo()">恢复演示数据</button>
<p class="muted">演示版数据保存在当前浏览器本地；正式小程序需要换成微信云开发数据库。</p>
</div>
</section>

<section id="detail" class="page"><div id="orderDetail"></div></section>
</div>

<div class="tabs"><div class="tabs-inner">
<button class="tab active" data-page="home" onclick="showPage('home')"><b>▦</b>首页</button>
<button class="tab" data-page="orders" onclick="showPage('orders')"><b>▤</b>指令单</button>
<button class="tab" data-page="inventory" onclick="showPage('inventory')"><b>□</b>物料</button>
<button class="tab" data-page="products" onclick="showPage('products')"><b>☰</b>产品</button>
<button class="tab" data-page="reports" onclick="showPage('reports')"><b>◔</b>报表</button>
</div></div>

<script>
const KEY='yigendan_demo_v2';
let state=JSON.parse(localStorage.getItem(KEY)||'null')||{
products:[{code:'A001',name:'女童泳衣',sizes:['S','M','L','XL']}],
materials:[
{product_code:'A001',name:'面料',spec:'粉色涤纶',usage:1.2,price:15,unit:'米'},
{product_code:'A001',name:'拉链',spec:'30cm',usage:1,price:1.5,unit:'条'},
{product_code:'A001',name:'吊牌',spec:'通用',usage:1,price:.2,unit:'个'}
],
inventory:[
{name:'面料',spec:'粉色涤纶',stock:200,onway:100,unit:'米'},
{name:'拉链',spec:'30cm',stock:400,onway:0,unit:'条'},
{name:'吊牌',spec:'通用',stock:100,onway:100,unit:'个'}
],
orders:[]
};
if(!state.orders.length){state.orders.push(makeOrder('A001','粉色',{S:50,M:100,L:100,XL:50},'ORD-20260101-001'));save();}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function product(code){return state.products.find(p=>p.code===code)}
function mats(code){return state.materials.filter(m=>m.product_code===code)}
function invOf(m){return state.inventory.find(i=>i.name===m.name&&i.spec===m.spec)||{stock:0,onway:0,unit:m.unit}}
function calcStatus(total,stock,onway){if(stock>=total)return{need:0,status:'齐套',cls:'ok'};if(stock+onway>=total)return{need:0,status:'部分在途',cls:'warn'};return{need:+(total-stock-onway).toFixed(2),status:'待采购',cls:'danger'}}
function makeOrder(code,color,breakdown,id){let p=product(code),total=Object.values(breakdown).reduce((a,b)=>a+Number(b||0),0);let ms=mats(code).map(m=>{let inv=invOf(m),need=+(m.usage*total).toFixed(2),s=calcStatus(need,inv.stock,inv.onway);return{...m,total_need:need,current_stock:inv.stock,ordered_on_way:inv.onway,need_order:s.need,status:s.status,cls:s.cls,cost:+(need*m.price).toFixed(2)}});let ready=ms.filter(x=>x.status==='齐套').length;return{id:id||('ORD-'+Date.now()),product_code:code,product_name:p?p.name:'',color,total_qty:total,size_breakdown:breakdown,created:new Date().toISOString().slice(0,10),material_status:ms,ready_rate:ms.length?Math.round(ready/ms.length*100):0,warning_count:ms.filter(x=>x.status!=='齐套').length}}
function recalcOrders(){state.orders=state.orders.map(o=>makeOrder(o.product_code,o.color,o.size_breakdown,o.id));save()}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===id));renderAll()}
function renderAll(){recalcOrders();renderHome();renderSelects();renderOrders();renderInventory();renderProducts();renderMaterials()}
function renderHome(){document.getElementById('pendingCount').innerText=state.orders.filter(o=>o.ready_rate<100).length;document.getElementById('warnCount').innerText=state.orders.reduce((a,o)=>a+o.warning_count,0);document.getElementById('recentOrders').innerHTML=state.orders.slice(-3).reverse().map(orderCard).join('')||'<div class="empty">暂无指令单</div>'}
function orderCard(o){return `<div class="order" onclick="openDetail('${o.id}')"><div><strong>${o.id}</strong><div class="muted">${o.product_name} · ${o.total_qty}件 · 齐套率 ${o.ready_rate}%</div><div class="progress"><div class="bar" style="width:${o.ready_rate}%"></div></div></div><span class="tag ${o.warning_count?'warn':'ok'}">${o.warning_count?'待生产':'齐套'}</span></div>`}
function renderOrders(){document.getElementById('ordersList').innerHTML=state.orders.slice().reverse().map(orderCard).join('')||'<div class="empty">暂无指令单</div>'}
function renderSelects(){let opts=state.products.map(p=>`<option value="${p.code}">${p.code} - ${p.name}</option>`).join('');['orderProduct','mProduct'].forEach(id=>{let el=document.getElementById(id);if(el)el.innerHTML=opts});let matOpts=state.inventory.map((m,i)=>`<option value="${i}">${m.name} / ${m.spec}</option>`).join('');let sm=document.getElementById('stockMaterial');if(sm)sm.innerHTML=matOpts;renderSizeInputs()}
function renderSizeInputs(){let code=document.getElementById('orderProduct')?.value,p=product(code),box=document.getElementById('sizeInputs');if(!box||!p)return;box.innerHTML='<div class="card-title" style="font-size:16px">尺码数量</div>'+p.sizes.map(s=>`<label>${s}</label><input class="sizeQty" data-size="${s}" type="number" placeholder="${s} 数量" value="0">`).join('')}
function createOrder(){let code=document.getElementById('orderProduct').value,color=document.getElementById('orderColor').value.trim(),bd={};document.querySelectorAll('.sizeQty').forEach(i=>bd[i.dataset.size]=Number(i.value||0));if(!code||!color||Object.values(bd).reduce((a,b)=>a+b,0)<=0){alert('请填写产品、颜色和尺码数量');return}state.orders.push(makeOrder(code,color,bd));save();document.getElementById('orderColor').value='';alert('创建成功');showPage('orders')}
function openDetail(id){let o=state.orders.find(x=>x.id===id);if(!o)return;let sizes=Object.entries(o.size_breakdown).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');let ms=o.material_status.map(m=>`<tr><td>${m.name}<br><span class="muted">${m.spec}</span></td><td>${m.total_need}</td><td>${m.current_stock}</td><td>${m.ordered_on_way}</td><td>${m.need_order}</td><td><span class="tag ${m.cls}">${m.status}</span></td></tr>`).join('');document.getElementById('orderDetail').innerHTML=`<div class="card"><div class="card-title">${o.id}</div><p>${o.product_code} - ${o.product_name}</p><p>颜色：${o.color}　总数：${o.total_qty}件</p><p>齐套率：${o.ready_rate}%　预警：${o.warning_count}</p></div><div class="card"><div class="card-title">尺码配比</div><table class="table"><tr><th>尺码</th><th>数量</th></tr>${sizes}</table></div><div class="card"><div class="card-title">物料明细</div><table class="table"><tr><th>物料</th><th>需用</th><th>库存</th><th>在途</th><th>还需</th><th>状态</th></tr>${ms}</table><button class="btn" onclick="exportOne('${o.id}')">导出本单 CSV</button></div>`;showPage('detail')}
function renderInventory(){let kw=(document.getElementById('searchMat')?.value||'').trim();let list=state.inventory.filter(i=>!kw||i.name.includes(kw)||i.spec.includes(kw));document.getElementById('inventoryList').innerHTML=list.map(i=>`<div class="card"><div class="card-title">${i.name}</div><p>规格：${i.spec}</p><p>当前库存：${i.stock} ${i.unit}</p><p>已下单未到：${i.onway} ${i.unit}</p></div>`).join('')||'<div class="empty">暂无物料</div>'}
function stockOperation(){let idx=Number(document.getElementById('stockMaterial').value),type=document.getElementById('stockType').value,qty=Number(document.getElementById('stockQty').value||0),item=state.inventory[idx];if(!item||qty<=0){alert('请选择物料并填写数量');return}if(type==='in'){item.stock+=qty;item.onway=Math.max(0,item.onway-qty)}if(type==='out'){if(item.stock<qty){alert('库存不足');return}item.stock-=qty}if(type==='onway'){item.onway+=qty}save();document.getElementById('stockQty').value='';alert('操作成功');showPage('inventory')}
function addProduct(){let code=pCode.value.trim(),name=pName.value.trim(),sizes=pSizes.value.split(',').map(x=>x.trim()).filter(Boolean);if(!code||!name||!sizes.length){alert('请填完整');return}state.products.push({code,name,sizes});save();pCode.value=pName.value=pSizes.value='';renderAll();alert('保存成功')}
function renderProducts(){productList.innerHTML=state.products.map(p=>`<div class="card"><div class="card-title">${p.code}</div><p>${p.name}</p><p class="muted">尺码：${p.sizes.join('、')}</p></div>`).join('')}
function addMaterial(){let item={product_code:mProduct.value,name:mName.value.trim(),spec:mSpec.value.trim(),usage:Number(mUsage.value||0),price:Number(mPrice.value||0),unit:mUnit.value.trim()||'个'};if(!item.product_code||!item.name||!item.usage){alert('请填完整');return}state.materials.push(item);if(!state.inventory.find(i=>i.name===item.name&&i.spec===item.spec))state.inventory.push({name:item.name,spec:item.spec,stock:0,onway:0,unit:item.unit});save();['mName','mSpec','mUsage','mPrice','mUnit'].forEach(id=>document.getElementById(id).value='');renderAll();alert('保存成功')}
function renderMaterials(){materialList.innerHTML=state.materials.map(m=>`<div class="card"><div class="card-title">${m.name}</div><p>货号：${m.product_code}　规格：${m.spec}</p><p>单件用量：${m.usage}${m.unit}　单价：${m.price}</p></div>`).join('')}
function csvRows(o){return [['指令单',o.id],['货号',o.product_code],['品名',o.product_name],['颜色',o.color],['总数量',o.total_qty],[],['物料','规格','需用','库存','在途','还需','状态','成本'],...o.material_status.map(m=>[m.name,m.spec,m.total_need,m.current_stock,m.ordered_on_way,m.need_order,m.status,m.cost])]}
function downloadCSV(name,rows){let csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:'text/csv;charset=utf-8'}));a.download=name;a.click()}
function exportOne(id){let o=state.orders.find(x=>x.id===id);downloadCSV(o.id+'.csv',csvRows(o))}
function exportCSV(){let rows=[];state.orders.forEach(o=>{rows=rows.concat(csvRows(o),[[],[]])});downloadCSV('衣跟单报表.csv',rows)}
function resetDemo(){localStorage.removeItem(KEY);location.reload()}
renderAll();
</script>
</body>
</html>
