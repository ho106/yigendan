<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>衣跟单</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial;color:#1f2937}
.app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:78px}
.header{background:#fff;padding:18px;text-align:center;font-size:24px;font-weight:900;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.page{display:none;padding:16px}.page.active{display:block}
.card{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 8px 22px rgba(0,0,0,.05)}
.title{font-size:20px;font-weight:900;margin-bottom:12px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{border-radius:18px;color:#fff;padding:18px}.blue{background:#2f6df6}.orange{background:#ff681f}
.num{font-size:38px;font-weight:900;margin:8px 0}
input,select{width:100%;padding:12px;margin:6px 0 12px;border:1px solid #ddd;border-radius:12px;font-size:16px}
button{border:0;border-radius:12px;padding:12px 14px;background:#2f6df6;color:#fff;font-size:16px;font-weight:800;margin:4px 0}
.btn2{background:#22b573}.btn3{background:#ff681f}.btn4{background:#6b7280}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item{background:#f8fafc;border-radius:14px;padding:12px;margin:10px 0;border:1px solid #eef1f5}
.tag{display:inline-block;border-radius:999px;padding:5px 10px;font-size:13px;font-weight:800}
.ok{background:#e8f8ef;color:#159957}.warn{background:#fff3d8;color:#b77900}.bad{background:#ffe8e8;color:#d9363e}
.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid #eee;padding:8px 4px;text-align:left}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ddd;display:flex;justify-content:center}
.nav div{max-width:520px;width:100%;display:grid;grid-template-columns:repeat(5,1fr)}
.nav button{background:#fff;color:#8b95a5;border-radius:0;font-size:12px}.nav button.active{color:#2f6df6}
.nav b{display:block;font-size:22px}
</style>
</head>
<body>
<div class="app">
<div class="header">衣跟单</div>

<section id="home" class="page active">
  <div class="stats">
    <div class="stat blue"><div>指令单</div><div id="orderCount" class="num">0</div><div>生产任务</div></div>
    <div class="stat orange"><div>缺料预警</div><div id="warnCount" class="num">0</div><div>需要采购</div></div>
  </div>
  <div class="card">
    <div class="title">最近指令单</div>
    <div id="homeOrders"></div>
  </div>
</section>

<section id="products" class="page">
  <div class="card">
    <div class="title">产品管理</div>
    <input id="pCode" placeholder="货号，例如 A001">
    <input id="pName" placeholder="品名，例如 女童泳衣">
    <input id="pSizes" placeholder="尺码，用逗号分隔，例如 S,M,L,XL">
    <button onclick="addProduct()">保存产品</button>
  </div>
  <div class="card"><div class="title">产品列表</div><div id="productList"></div></div>
</section>

<section id="materials" class="page">
  <div class="card">
    <div class="title">物料 BOM</div>
    <select id="mProduct"></select>
    <input id="mName" placeholder="物料名称，例如 面料">
    <input id="mSpec" placeholder="规格，例如 粉色涤纶">
    <div class="row">
      <input id="mUsage" type="number" placeholder="单件用量">
      <input id="mPrice" type="number" placeholder="单价">
    </div>
    <input id="mUnit" placeholder="单位，例如 米/个/条">
    <button class="btn3" onclick="addMaterial()">保存物料</button>
  </div>
  <div class="card"><div class="title">物料清单</div><div id="materialList"></div></div>
</section>

<section id="orders" class="page">
  <div class="card">
    <div class="title">新建指令单</div>
    <select id="oProduct" onchange="renderSizeInputs()"></select>
    <input id="oColor" placeholder="颜色，例如 粉色">
    <div id="sizeBox"></div>
    <button onclick="addOrder()">创建指令单</button>
  </div>
  <div class="card"><div class="title">指令单列表</div><div id="orderList"></div></div>
</section>

<section id="stock" class="page">
  <div class="card">
    <div class="title">入库 / 出库 / 在途</div>
    <select id="sMaterial"></select>
    <select id="sType">
      <option value="in">采购到货入库</option>
      <option value="out">生产领料出库</option>
      <option value="onway">已下单未到</option>
    </select>
    <input id="sQty" type="number" placeholder="数量">
    <button class="btn2" onclick="stockOp()">提交</button>
  </div>
  <div class="card"><div class="title">库存总览</div><div id="stockList"></div></div>
</section>

<section id="detail" class="page">
  <div id="detailBox"></div>
</section>

<section id="report" class="page">
  <div class="card">
    <div class="title">报表导出</div>
    <button onclick="exportCSV()">导出 CSV</button>
    <button class="btn4" onclick="resetData()">恢复演示数据</button>
  </div>
</section>
</div>

<div class="nav"><div>
<button onclick="show('home',this)" class="active"><b>▦</b>首页</button>
<button onclick="show('orders',this)"><b>▤</b>指令单</button>
<button onclick="show('stock',this)"><b>□</b>库存</button>
<button onclick="show('products',this)"><b>👕</b>产品</button>
<button onclick="show('report',this)"><b>◔</b>报表</button>
</div></div>

<script>
const KEY="yigendan_full_v1";
let data=JSON.parse(localStorage.getItem(KEY)||"null")||{
products:[{code:"A001",name:"女童泳衣",sizes:["S","M","L","XL"]}],
materials:[
{code:"A001",name:"面料",spec:"粉色涤纶",usage:1.2,price:15,unit:"米"},
{code:"A001",name:"拉链",spec:"30cm",usage:1,price:1.5,unit:"条"},
{code:"A001",name:"吊牌",spec:"通用",usage:1,price:0.2,unit:"个"}
],
stock:[
{name:"面料",spec:"粉色涤纶",stock:200,onway:100,unit:"米"},
{name:"拉链",spec:"30cm",stock:400,onway:0,unit:"条"},
{name:"吊牌",spec:"通用",stock:100,onway:100,unit:"个"}
],
orders:[]
};
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function product(code){return data.products.find(p=>p.code===code)}
function bom(code){return data.materials.filter(m=>m.code===code)}
function inv(m){return data.stock.find(s=>s.name===m.name&&s.spec===m.spec)||{stock:0,onway:0,unit:m.unit}}
function status(total,stock,onway){
 if(stock>=total)return{need:0,text:"齐套",cls:"ok"};
 if(stock+onway>=total)return{need:0,text:"部分在途",cls:"warn"};
 return{need:+(total-stock-onway).toFixed(2),text:"待采购",cls:"bad"};
}
function makeOrder(code,color,sizes,id){
 let p=product(code),qty=Object.values(sizes).reduce((a,b)=>a+Number(b||0),0);
 let ms=bom(code).map(m=>{
  let i=inv(m),need=+(m.usage*qty).toFixed(2),st=status(need,i.stock,i.onway);
  return {...m,total:need,stock:i.stock,onway:i.onway,needOrder:st.need,status:st.text,cls:st.cls,cost:+(need*m.price).toFixed(2)}
 });
 let ready=ms.filter(x=>x.status==="齐套").length;
 return{id:id||("ORD-"+Date.now()),code,name:p?p.name:"",color,sizes,qty,materials:ms,rate:ms.length?Math.round(ready/ms.length*100):0,warn:ms.filter(x=>x.status!=="齐套").length};
}
if(!data.orders.length){data.orders.push(makeOrder("A001","粉色",{S:50,M:100,L:100,XL:50},"ORD-20260101-001"));save()}
function recalc(){data.orders=data.orders.map(o=>makeOrder(o.code,o.color,o.sizes,o.id));save()}
function show(id,btn){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
 if(btn)btn.classList.add("active");
 render();
}
function render(){
 recalc();
 renderSelects();renderHome();renderProducts();renderMaterials();renderOrders();renderStock();
}
function renderHome(){
 orderCount.innerText=data.orders.length;
 warnCount.innerText=data.orders.reduce((a,o)=>a+o.warn,0);
 homeOrders.innerHTML=data.orders.slice().reverse().map(orderCard).join("")||"暂无指令单";
}
function orderCard(o){
 return `<div class="item" onclick="openOrder('${o.id}')"><b>${o.id}</b><br>${o.code} ${o.name} · ${o.color} · ${o.qty}件<br>齐套率：${o.rate}%　预警：${o.warn}<br><span class="tag ${o.warn?'warn':'ok'}">${o.warn?'待处理':'齐套'}</span></div>`;
}
function renderSelects(){
 let ps=data.products.map(p=>`<option value="${p.code}">${p.code} - ${p.name}</option>`).join("");
 oProduct.innerHTML=ps;mProduct.innerHTML=ps;
 sMaterial.innerHTML=data.stock.map((s,i)=>`<option value="${i}">${s.name}/${s.spec}</option>`).join("");
 renderSizeInputs();
}
function renderSizeInputs(){
 let p=product(oProduct.value); if(!p)return;
 sizeBox.innerHTML=p.sizes.map(s=>`<input class="sizeInput" data-size="${s}" type="number" placeholder="${s} 数量">`).join("");
}
function addProduct(){
 if(!pCode.value||!pName.value||!pSizes.value){alert("请填完整");return}
 data.products.push({code:pCode.value.trim(),name:pName.value.trim(),sizes:pSizes.value.split(",").map(x=>x.trim()).filter(Boolean)});
 save();pCode.value=pName.value=pSizes.value="";render();alert("产品已保存");
}
function renderProducts(){
 productList.innerHTML=data.products.map(p=>`<div class="item"><b>${p.code}</b><br>${p.name}<br>尺码：${p.sizes.join("、")}</div>`).join("");
}
function addMaterial(){
 let item={code:mProduct.value,name:mName.value.trim(),spec:mSpec.value.trim(),usage:+mUsage.value,price:+mPrice.value,unit:mUnit.value.trim()||"个"};
 if(!item.name||!item.usage){alert("请填完整");return}
 data.materials.push(item);
 if(!data.stock.find(s=>s.name===item.name&&s.spec===item.spec))data.stock.push({name:item.name,spec:item.spec,stock:0,onway:0,unit:item.unit});
 save();mName.value=mSpec.value=mUsage.value=mPrice.value=mUnit.value="";render();alert("物料已保存");
}
function renderMaterials(){
 materialList.innerHTML=data.materials.map(m=>`<div class="item"><b>${m.name}</b><br>货号：${m.code}<br>规格：${m.spec}<br>单耗：${m.usage}${m.unit}　单价：${m.price}</div>`).join("");
}
function addOrder(){
 let sizes={};document.querySelectorAll(".sizeInput").forEach(i=>sizes[i.dataset.size]=+i.value||0);
 if(!oColor.value||Object.values(sizes).reduce((a,b)=>a+b,0)<=0){alert("请填写颜色和数量");return}
 data.orders.push(makeOrder(oProduct.value,oColor.value.trim(),sizes));
 save();oColor.value="";render();alert("指令单已创建");
}
function renderOrders(){orderList.innerHTML=data.orders.slice().reverse().map(orderCard).join("")}
function openOrder(id){
 let o=data.orders.find(x=>x.id===id);
 let sizeRows=Object.entries(o.sizes).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join("");
 let matRows=o.materials.map(m=>`<tr><td>${m.name}<br>${m.spec}</td><td>${m.total}</td><td>${m.stock}</td><td>${m.onway}</td><td>${m.needOrder}</td><td><span class="tag ${m.cls}">${m.status}</span></td></tr>`).join("");
 detailBox.innerHTML=`<div class="card"><div class="title">${o.id}</div>${o.code} ${o.name}<br>颜色：${o.color}<br>总数：${o.qty}<br>齐套率：${o.rate}%</div>
 <div class="card"><div class="title">尺码配比</div><table class="table"><tr><th>尺码</th><th>数量</th></tr>${sizeRows}</table></div>
 <div class="card"><div class="title">物料明细</div><table class="table"><tr><th>物料</th><th>需用</th><th>库存</th><th>在途</th><th>还需</th><th>状态</th></tr>${matRows}</table></div>`;
 show("detail");
}
function stockOp(){
 let s=data.stock[+sMaterial.value],q=+sQty.value,t=sType.value;
 if(!q||q<=0){alert("请输入数量");return}
 if(t==="in"){s.stock+=q;s.onway=Math.max(0,s.onway-q)}
 if(t==="out"){if(s.stock<q){alert("库存不足");return}s.stock-=q}
 if(t==="onway"){s.onway+=q}
 save();sQty.value="";render();alert("操作成功");
}
function renderStock(){
 stockList.innerHTML=data.stock.map(s=>`<div class="item"><b>${s.name}</b><br>规格：${s.spec}<br>库存：${s.stock}${s.unit}<br>在途：${s.onway}${s.unit}</div>`).join("");
}
function exportCSV(){
 let rows=[["指令单","货号","品名","颜色","数量","齐套率","预警"]];
 data.orders.forEach(o=>rows.push([o.id,o.code,o.name,o.color,o.qty,o.rate,o.warn]));
 let csv=rows.map(r=>r.map(x=>`"${x}"`).join(",")).join("\\n");
 let a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\\ufeff"+csv],{type:"text/csv"}));a.download="衣跟单报表.csv";a.click();
}
function resetData(){localStorage.removeItem(KEY);location.reload()}
render();
</script>
</body>

}
if(!data.orders.length){data.orders.push(makeOrder("A001","粉色",{S:50,M:100,L:100,XL:50},"ORD-20260101-001"));save()}
function recalc(){data.orders=data.orders.map(o=>makeOrder(o.code,o.color,o.sizes,o.id));save()}
function show(id,btn){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
 document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
 if(btn)btn.classList.add("active");
 render();
}
function render(){
 recalc();
 renderSelects();renderHome();renderProducts();renderMaterials();renderOrders();renderStock();
}
function renderHome(){
 orderCount.innerText=data.orders.length;
 warnCount.innerText=data.orders.reduce((a,o)=>a+o.warn,0);
 homeOrders.innerHTML=data.orders.slice().reverse().map(orderCard).join("")||"暂无指令单";
}
function orderCard(o){
 return `<div class="item" onclick="openOrder('${o.id}')"><b>${o.id}</b><br>${o.code} ${o.name} · ${o.color} · ${o.qty}件<br>齐套率：${o.rate}%　预警：${o.warn}<br><span class="tag ${o.warn?'warn':'ok'}">${o.warn?'待处理':'齐套'}</span></div>`;
}
function renderSelects(){
 let ps=data.products.map(p=>`<option value="${p.code}">${p.code} - ${p.name}</option>`).join("");
 oProduct.innerHTML=ps;mProduct.innerHTML=ps;
 sMaterial.innerHTML=data.stock.map((s,i)=>`<option value="${i}">${s.name}/${s.spec}</option>`).join("");
 renderSizeInputs();
}
function renderSizeInputs(){
 let p=product(oProduct.value); if(!p)return;
 sizeBox.innerHTML=p.sizes.map(s=>`<input class="sizeInput" data-size="${s}" type="number" placeholder="${s} 数量">`).join("");
}
function addProduct(){
 if(!pCode.value||!pName.value||!pSizes.value){alert("请填完整");return}
 data.products.push({code:pCode.value.trim(),name:pName.value.trim(),sizes:pSizes.value.split(",").map(x=>x.trim()).filter(Boolean)});
 save();pCode.value=pName.value=pSizes.value="";render();alert("产品已保存");
}
function renderProducts(){
 productList.innerHTML=data.products.map(p=>`<div class="item"><b>${p.code}</b><br>${p.name}<br>尺码：${p.sizes.join("、")}</div>`).join("");
}
function addMaterial(){
 let item={code:mProduct.value,name:mName.value.trim(),spec:mSpec.value.trim(),usage:+mUsage.value,price:+mPrice.value,unit:mUnit.value.trim()||"个"};
 if(!item.name||!item.usage){alert("请填完整");return}
 data.materials.push(item);
 if(!data.stock.find(s=>s.name===item.name&&s.spec===item.spec))data.stock.push({name:item.name,spec:item.spec,stock:0,onway:0,unit:item.unit});
 save();mName.value=mSpec.value=mUsage.value=mPrice.value=mUnit.value="";render();alert("物料已保存");
}
function renderMaterials(){
 materialList.innerHTML=data.materials.map(m=>`<div class="item"><b>${m.name}</b><br>货号：${m.code}<br>规格：${m.spec}<br>单耗：${m.usage}${m.unit}　单价：${m.price}</div>`).join("");
}
function addOrder(){
 let sizes={};document.querySelectorAll(".sizeInput").forEach(i=>sizes[i.dataset.size]=+i.value||0);
 if(!oColor.value||Object.values(sizes).reduce((a,b)=>a+b,0)<=0){alert("请填写颜色和数量");return}
 data.orders.push(makeOrder(oProduct.value,oColor.value.trim(),sizes));
 save();oColor.value="";render();alert("指令单已创建");
}
function renderOrders(){orderList.innerHTML=data.orders.slice().reverse().map(orderCard).join("")}
function openOrder(id){
 let o=data.orders.find(x=>x.id===id);
 let sizeRows=Object.entries(o.sizes).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join("");
 let matRows=o.materials.map(m=>`<tr><td>${m.name}<br>${m.spec}</td><td>${m.total}</td><td>${m.stock}</td><td>${m.onway}</td><td>${m.needOrder}</td><td><span class="tag ${m.cls}">${m.status}</span></td></tr>`).join("");
 detailBox.innerHTML=`<div class="card"><div class="title">${o.id}</div>${o.code} ${o.name}<br>颜色：${o.color}<br>总数：${o.qty}<br>齐套率：${o.rate}%</div>
 <div class="card"><div class="title">尺码配比</div><table class="table"><tr><th>尺码</th><th>数量</th></tr>${sizeRows}</table></div>
 <div class="card"><div class="title">物料明细</div><table class="table"><tr><th>物料</th><th>需用</th><th>库存</th><th>在途</th><th>还需</th><th>状态</th></tr>${matRows}</table></div>`;
 show("detail");
}
function stockOp(){
 let s=data.stock[+sMaterial.value],q=+sQty.value,t=sType.value;
 if(!q||q<=0){alert("请输入数量");return}
 if(t==="in"){s.stock+=q;s.onway=Math.max(0,s.onway-q)}
 if(t==="out"){if(s.stock<q){alert("库存不足");return}s.stock-=q}
 if(t==="onway"){s.onway+=q}
 save();sQty.value="";render();alert("操作成功");
}
function renderStock(){
 stockList.innerHTML=data.stock.map(s=>`<div class="item"><b>${s.name}</b><br>规格：${s.spec}<br>库存：${s.stock}${s.unit}<br>在途：${s.onway}${s.unit}</div>`).join("");
}
function exportCSV(){
 let rows=[["指令单","货号","品名","颜色","数量","齐套率","预警"]];
 data.orders.forEach(o=>rows.push([o.id,o.code,o.name,o.color,o.qty,o.rate,o.warn]));
 let csv=rows.map(r=>r.map(x=>`"${x}"`).join(",")).join("\\n");
 let a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\\ufeff"+csv],{type:"text/csv"}));a.download="衣跟单报表.csv";a.click();
}
function resetData(){localStorage.removeItem(KEY);location.reload()}
render();
</script>
</body>
</html>
