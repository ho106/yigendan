<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衣跟单</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
.header{background:#fff;padding:16px;text-align:center;font-size:20px;font-weight:bold}
.page{display:none;padding:16px}
.page.active{display:block}
.card{background:#fff;padding:16px;margin-bottom:12px;border-radius:12px}
.btn{padding:12px;background:#409eff;color:#fff;border:none;border-radius:8px;margin-top:8px}
.tabbar{position:fixed;bottom:0;width:100%;display:flex;background:#fff}
.tabbar div{flex:1;text-align:center;padding:10px}
.activeTab{color:#409eff}
</style>

</head>
<body>

<div class="header">衣跟单系统</div>

<!-- 首页 -->
<div id="home" class="page active">
  <div class="card" onclick="goPage('order')">
    <h3>📦 指令单管理</h3>
    <p>点击进入</p>
  </div>

  <div class="card" onclick="goPage('stock')">
    <h3>📊 库存管理</h3>
    <p>点击进入</p>
  </div>
</div>

<!-- 指令单 -->
<div id="order" class="page">
  <div class="card">
    <h3>新建指令单</h3>
    <input id="orderName" placeholder="产品名称"><br>
    <input id="orderQty" type="number" placeholder="数量"><br>
    <button class="btn" onclick="addOrder()">创建</button>
  </div>

  <div class="card">
    <h3>指令单列表</h3>
    <div id="orderList"></div>
  </div>
</div>

<!-- 库存 -->
<div id="stock" class="page">
  <div class="card">
    <h3>库存操作</h3>
    <input id="material" placeholder="物料名"><br>
    <input id="qty" type="number" placeholder="数量"><br>
    <select id="type">
      <option value="in">入库</option>
      <option value="out">出库</option>
    </select><br>
    <button class="btn" onclick="stockOp()">提交</button>
  </div>

  <div class="card">
    <h3>库存列表</h3>
    <div id="stockList"></div>
  </div>
</div>

<!-- 底部 -->
<div class="tabbar">
  <div onclick="goPage('home')">首页</div>
  <div onclick="goPage('order')">指令单</div>
  <div onclick="goPage('stock')">库存</div>
</div>

<script>

let orders = JSON.parse(localStorage.getItem('orders')||'[]')
let stocks = JSON.parse(localStorage.getItem('stocks')||'{}')

function goPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'))
  document.getElementById(p).classList.add('active')
}

function addOrder(){
  let name = document.getElementById('orderName').value
  let qty = document.getElementById('orderQty').value

  if(!name||!qty)return alert('填完整')

  orders.push({name,qty})
  localStorage.setItem('orders',JSON.stringify(orders))
  renderOrders()
}

function renderOrders(){
  let html=''
  orders.forEach(o=>{
    html+=`<div>${o.name} - ${o.qty}</div>`
  })
  document.getElementById('orderList').innerHTML=html
}

function stockOp(){
  let m=document.getElementById('material').value
  let q=Number(document.getElementById('qty').value)
  let t=document.getElementById('type').value

  if(!m||!q)return alert('填完整')

  if(!stocks[m])stocks[m]=0

  if(t==='in')stocks[m]+=q
  else stocks[m]-=q

  localStorage.setItem('stocks',JSON.stringify(stocks))
  renderStock()
}

function renderStock(){
  let html=''
  for(let k in stocks){
    html+=`<div>${k}：${stocks[k]}</div>`
  }
  document.getElementById('stockList').innerHTML=html
}

renderOrders()
renderStock()

</script>

</body>
</html>
