<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>衣跟单 V5 多色多码版</title>
<style>
:root{
  --blue:#2f6df6;--green:#18a058;--orange:#ff7a1a;--red:#e5484d;
  --bg:#f5f6fa;--card:#fff;--text:#1f2937;--muted:#7b8494;--line:#e9edf5;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--text);user-select:none}
.app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:82px}
.header{position:sticky;top:0;z-index:9;background:#fff;padding:16px;text-align:center;font-size:22px;font-weight:900;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.page{display:none;padding:16px}.page.active{display:block}
.card{background:#fff;border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 8px 24px rgba(30,41,59,.06)}
.title{font-size:19px;font-weight:900;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.sub{color:var(--muted);font-size:13px;line-height:1.5}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{border-radius:18px;color:#fff;padding:18px;min-height:112px}
.blue{background:linear-gradient(135deg,#4a8bff,#245df0)}.orange{background:linear-gradient(135deg,#ff9a2b,#ff4d0d)}.green{background:linear-gradient(135deg,#28c76f,#159957)}.red{background:linear-gradient(135deg,#ff6b6b,#d9363e)}
.stat .num{font-size:36px;font-weight:900;margin:8px 0}
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}.quick button{background:#fff;color:var(--text);border:0;font-weight:700}
.qicon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:25px;background:#eef4ff;color:var(--blue)}
label{font-size:14px;font-weight:800;display:block;margin-top:6px}
input,select,textarea{width:100%;padding:12px;border:1px solid #dbe1ea;border-radius:12px;background:#fff;font-size:15px;margin:6px 0 12px}
textarea{min-height:96px}
button{border:0;border-radius:12px;background:var(--blue);color:#fff;padding:12px 14px;font-size:15px;font-weight:900;margin:4px 0}
.btn-green{background:var(--green)}.btn-orange{background:var(--orange)}.btn-red{background:var(--red)}.btn-gray{background:#eef2f7;color:#1f2937}.btn-small{padding:7px 10px;font-size:13px;border-radius:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.item{background:#fafbfe;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}
.item:active{opacity:.75}
.item-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.tag{display:inline-block;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:900;white-space:nowrap}
.ok{background:#e8f8ef;color:#159957}.warn{background:#fff2d6;color:#a96a00}.bad{background:#ffe9ea;color:#d9363e}.gray{background:#eef2f7;color:#4b5563}
.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}.table th,.table td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:left;vertical-align:top}.table th{background:#fafafa;color:#6b7280}
.progress{height:9px;background:#e9edf5;border-radius:99px;overflow:hidden;margin:8px 0}.bar{height:100%;background:var(--green)}
.nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #e5e7eb;z-index:10;display:flex;justify-content:center}.nav-inner{max-width:560px;width:100%;display:grid;grid-template-columns:repeat(5,1fr)}
.nav button{background:#fff;color:#8b95a5;border-radius:0;padding:8px 0;font-size:12px}.nav button.active{color:var(--blue)}.nav b{display:block;font-size:22px;line-height:22px}
.empty{color:#9aa2b1;text-align:center;padding:20px}.danger-text{color:var(--red);font-weight:900}.hide{display:none}
hr{border:0;border-top:1px solid var(--line);margin:12px 0}
.size-tags{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}
.size-tag{background:#eef4ff;color:#2f6df6;border-radius:999px;padding:7px 12px;font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.size-tag .del-size{color:#e5484d;cursor:pointer;font-weight:900;font-size:18px;line-height:1}
.color-row{background:#fafbfe;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}
.color-row .color-label{font-weight:800;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.img-preview{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
.img-preview img{width:72px;height:72px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
</style>
</head>
<body>
<div class="app">
  <div class="header">衣跟单 V5</div>

  <section id="home" class="page active">
    <div class="grid2">
      <div class="stat blue" onclick="showPage('orders')"><div>进行中指令单</div><div id="homeActiveCount" class="num">0</div><div>点击查看生产任务</div></div>
      <div class="stat orange" onclick="showPage('warning')"><div>缺料预警</div><div id="homeWarnCount" class="num">0</div><div>点击查看采购建议</div></div>
    </div>
    <div class="card">
      <div class="title">快捷操作</div>
      <div class="quick">
        <button onclick="showPage('orders')"><div class="qicon">＋</div>新建</button>
        <button onclick="showPage('stock')"><div class="qicon">↕</div>入库</button>
        <button onclick="showPage('products')"><div class="qicon">👕</div>产品</button>
        <button onclick="showPage('bom')"><div class="qicon">📦</div>物料</button>
      </div>
    </div>
    <div class="card"><div class="title">最近指令单 <button class="btn-small btn-gray" onclick="showPage('orders')">全部</button></div><div id="homeOrders"></div></div>
  </section>

  <section id="orders" class="page">
    <div class="card">
      <div class="title">新建生产指令单</div>
      <label>选择货号</label><select id="orderProduct" onchange="onOrderProductChange()"></select>
      <div id="orderProductImages" class="img-preview"></div>
      <div id="orderSizeConfig">
        <label>尺码段（可删除不需要的码）</label>
        <div class="size-tags" id="orderSizeTags"></div>
      </div>
      <div id="orderColorConfigs"></div>
      <button class="btn-gray btn-small" onclick="addColorRow()" style="margin-bottom:12px">+ 新增颜色</button>
      <button onclick="createOrderV5()">创建指令单并锁定 BOM</button>
      <div class="sub">BOM快照锁定，后续修改不影响此单。总数量自动汇总。</div>
    </div>
    <div class="card">
      <div class="title">指令单列表</div>
      <select id="orderFilter" onchange="renderOrders()">
        <option value="active">只看进行中</option>
        <option value="all">全部</option>
        <option value="completed">已完成</option>
        <option value="cancelled">已取消</option>
      </select>
      <div id="orderList"></div>
    </div>
  </section>

  <section id="detail" class="page"><div id="detailBox"></div></section>

  <section id="warning" class="page">
    <div class="card">
      <div class="title">采购建议 / 缺料汇总</div>
      <div class="sub">只统计“进行中”的指令单。按物料+规格合并总需求。</div>
      <div id="purchaseList"></div>
    </div>
    <div class="card"><div class="title">逐单缺料明细</div><div id="warningList"></div></div>
  </section>

  <section id="stock" class="page">
    <div class="card">
      <div class="title">库存操作</div>
      <label>选择物料</label><select id="stockMaterial"></select>
      <label>类型</label>
      <select id="stockType">
        <option value="in">采购到货入库</option>
        <option value="out">生产领料出库</option>
        <option value="onway">登记已下单未到</option>
      </select>
      <label>关联指令单（出库时建议选择）</label><select id="stockOrder"></select>
      <label>数量</label><input id="stockQty" type="number" placeholder="请输入数量">
      <label>备注</label><input id="stockRemark" placeholder="例如：第一批到货 / 某工单领料">
      <button class="btn-green" onclick="stockOperation()">提交操作</button>
    </div>
    <div class="card">
      <div class="title">库存总览</div>
      <input id="stockSearch" placeholder="搜索物料/规格" oninput="renderStock()">
      <div id="stockList"></div>
    </div>
    <div class="card"><div class="title">最近库存流水</div><div id="logList"></div></div>
  </section>

  <section id="products" class="page">
    <div class="card">
      <div class="title">产品管理</div>
      <label>货号</label><input id="pCode" placeholder="例如 A001">
      <label>品名</label><input id="pName" placeholder="例如 女童泳衣">
      <label>产品图片（可上传1-3张）</label>
      <input type="file" id="pImageInput" accept="image/*" onchange="addProductImage()" multiple>
      <div id="pImagePreview" class="img-preview"></div>
      <label>颜色，用逗号分隔</label><input id="pColors" placeholder="例如 粉色,蓝色">
      <div class="sub">颜色预设供指令单调用，尺码无需在此设置</div>
      <button onclick="addProductV5()">保存产品</button>
    </div>
    <div class="card"><div class="title">产品列表</div><div id="productList"></div></div>
  </section>

  <section id="bom" class="page">
    <div class="card">
      <div class="title">物料 BOM</div>
      <label>所属货号</label><select id="bomProduct"></select>
      <label>物料名称</label><input id="bomName" placeholder="例如 面料">
      <label>规格</label><input id="bomSpec" placeholder="例如 粉色涤纶">
      <div class="row3">
        <div><label>单件用量</label><input id="bomUsage" type="number" placeholder="1.2"></div>
        <div><label>单价</label><input id="bomPrice" type="number" placeholder="15"></div>
        <div><label>单位</label><input id="bomUnit" placeholder="米"></div>
      </div>
      <button class="btn-orange" onclick="addBom()">保存物料</button>
    </div>
    <div class="card"><div class="title">物料清单</div><div id="bomList"></div></div>
  </section>

  <section id="report" class="page">
    <div class="card">
      <div class="title">报表 / 数据</div>
      <button onclick="exportOrderCSV()">导出指令单明细 CSV</button>
      <button class="btn-green" onclick="exportPurchaseCSV()">导出采购建议 CSV</button>
      <button class="btn-gray" onclick="backupData()">备份数据</button>
      <button class="btn-orange" onclick="restoreData()">导入备份</button>
      <button class="btn-red" onclick="resetDemo()">恢复演示数据</button>
      <textarea id="backupBox" placeholder="备份数据会显示在这里；导入时把备份内容粘贴到这里"></textarea>
      <div class="sub">当前版本数据保存在本手机浏览器里。换手机或清理浏览器数据会丢失，正式版需要接微信云开发数据库。</div>
    </div>
  </section>
</div>

<div class="nav"><div class="nav-inner">
  <button data-nav="home" class="active" onclick="showPage('home')"><b>▦</b>首页</button>
  <button data-nav="orders" onclick="showPage('orders')"><b>▤</b>指令单</button>
  <button data-nav="stock" onclick="showPage('stock')"><b>□</b>库存</button>
  <button data-nav="products" onclick="showPage('products')"><b>👕</b>产品</button>
  <button data-nav="report" onclick="showPage('report')"><b>◔</b>报表</button>
</div></div>

<script>
const STORAGE_KEY = "yigendan_v5";
const DEFAULT_SIZES = ["80","90","100","110","120","130","140","150"];

function $(id){ return document.getElementById(id); }
function esc(value){
  return String(value ?? "").replace(/[&<>"']/g, function(s){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s];
  });
}
function uid(prefix){ return prefix + "-" + Date.now() + "-" + Math.floor(Math.random()*1000); }
function safeNumber(v){ const n = Number(v); return Number.isFinite(n) ? n : 0; }

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultData();
    const obj = JSON.parse(raw);
    if(!obj.products || !obj.boms || !obj.stocks || !obj.orders) return defaultData();
    obj.logs = obj.logs || [];
    return obj;
  }catch(e){ return defaultData(); }
}

function saveData(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  catch(e){ alert("保存失败，请备份并清理数据"); }
}

function defaultData(){
  return {
    products:[
      {id:uid("P"),code:"A001",name:"女童泳衣",images:[],colors:["粉色","蓝色"]}
    ],
    boms:[
      {id:uid("B"),code:"A001",name:"面料",spec:"粉色涤纶",usage:1.2,price:15,unit:"米"},
      {id:uid("B"),code:"A001",name:"拉链",spec:"30cm",usage:1,price:1.5,unit:"条"},
      {id:uid("B"),code:"A001",name:"吊牌",spec:"通用",usage:1,price:0.2,unit:"个"}
    ],
    stocks:[
      {id:uid("S"),name:"面料",spec:"粉色涤纶",stock:200,onway:100,unit:"米"},
      {id:uid("S"),name:"拉链",spec:"30cm",stock:400,onway:0,unit:"条"},
      {id:uid("S"),name:"吊牌",spec:"通用",stock:100,onway:100,unit:"个"}
    ],
    orders:[],
    logs:[]
  };
}

let data = loadData();
if(!data.orders.length){
  data.orders.push(createOrderObjectV5("A001",DEFAULT_SIZES,[{color:"粉色",quantities:{80:50,90:100,110:80,120:60}}],"ORD-DEMO"));
  saveData();
}

// ---------- 工具函数 ----------
function getProduct(code){ return data.products.find(p=>p.code===code); }
function getBoms(code){ return data.boms.filter(b=>b.code===code); }
function stockKey(n,s){ return n+"||"+s; }
function getStock(n,s){ return data.stocks.find(x=>x.name===n&&x.spec===s)||{stock:0,onway:0,unit:""}; }

function snapshotBoms(code){
  return getBoms(code).map(b=>({
    bom_id:b.id,code:b.code,name:b.name,spec:b.spec,
    usage:safeNumber(b.usage),price:safeNumber(b.price),unit:b.unit
  }));
}

function calcStatus(need,stock,onway){
  need=safeNumber(need);stock=safeNumber(stock);onway=safeNumber(onway);
  if(stock>=need) return {need:0,status:"齐套",cls:"ok"};
  if(stock+onway>=need) return {need:0,status:"部分在途",cls:"warn"};
  return {need:Number((need-stock-onway).toFixed(2)),status:"待采购",cls:"bad"};
}

function createOrderObjectV5(code,sizes,colorConfigs,id){
  const product = getProduct(code)||{name:"未知产品"};
  let totalQty = 0;
  colorConfigs.forEach(cc=>{ Object.values(cc.quantities||{}).forEach(v=>totalQty+=safeNumber(v)); });
  return {
    id:id||"ORD-"+Date.now(),code,product_name:product.name,
    sizes,colorConfigs,total_qty:totalQty,status:"active",
    created:new Date().toISOString().slice(0,10),
    bomSnapshot:snapshotBoms(code),issued:{},materials:[]
  };
}

function calcOrderMaterials(order){
  const materials = (order.bomSnapshot||[]).map(bom=>{
    const st = getStock(bom.name,bom.spec);
    const totalNeed = Number((safeNumber(bom.usage)*safeNumber(order.total_qty)).toFixed(2));
    const issuedQty = safeNumber((order.issued||{})[stockKey(bom.name,bom.spec)]);
    const remain = Math.max(0,Number((totalNeed-issuedQty).toFixed(2)));
    const result = order.status==="active"
      ? calcStatus(remain,safeNumber(st.stock),safeNumber(st.onway))
      : {need:0,status:order.status==="completed"?"已完成":"已取消",cls:"gray"};
    return {
      ...bom,total_need:totalNeed,issued_qty:issuedQty,remain_need:remain,
      current_stock:safeNumber(st.stock),ordered_on_way:safeNumber(st.onway),
      need_order:result.need,status:result.status,cls:result.cls,
      cost:Number((totalNeed*safeNumber(bom.price)).toFixed(2))
    };
  });
  const ready = materials.filter(m=>m.status==="齐套"||m.status==="已完成").length;
  const rate = materials.length?Math.round(ready/materials.length*100):0;
  const warn = order.status==="active"?materials.filter(m=>m.status!=="齐套").length:0;
  return {...order,materials,ready_rate:rate,warning_count:warn};
}

function recalcOrders(){ data.orders = data.orders.map(calcOrderMaterials); saveData(); }

// ---------- 产品图片 ----------
let tempProductImages = [];
function addProductImage(){
  const files = $("pImageInput").files;
  for(let f of files){
    if(tempProductImages.length>=3) break;
    const reader = new FileReader();
    reader.onload = function(e){ tempProductImages.push(e.target.result); renderProductImagePreview(); };
    reader.readAsDataURL(f);
  }
  $("pImageInput").value="";
}
function renderProductImagePreview(){
  $("pImagePreview").innerHTML = tempProductImages.map((src,i)=>`<img src="${src}" onclick="removeProductImage(${i})" title="点击删除">`).join("");
}
function removeProductImage(i){ tempProductImages.splice(i,1); renderProductImagePreview(); }

function addProductV5(){
  const code=$("pCode").value.trim(),name=$("pName").value.trim();
  const colors=$("pColors").value.split(",").map(x=>x.trim()).filter(Boolean);
  if(!code||!name){ alert("请填写货号和品名"); return; }
  if(data.products.some(p=>p.code===code)){ alert("货号已存在"); return; }
  data.products.push({id:uid("P"),code,name,images:tempProductImages.slice(),colors});
  saveData();
  $("pCode").value=$("pName").value=$("pColors").value="";
  tempProductImages=[]; renderProductImagePreview(); renderAll();
  alert("产品保存成功");
}

// ---------- 指令单创建 ----------
let orderSizes = [...DEFAULT_SIZES];
let orderColorRows = [];

function resetOrderForm(){
  orderSizes = [...DEFAULT_SIZES];
  orderColorRows = [{color:"",quantities:{}}];
  renderOrderSizes();
  renderColorRows();
  $("orderProductImages").innerHTML="";
}

function onOrderProductChange(){
  const code = $("orderProduct").value;
  const p = getProduct(code);
  $("orderProductImages").innerHTML = p&&p.images?p.images.map(src=>`<img src="${src}">`).join(""):"";
  orderColorRows = [{color:(p&&p.colors&&p.colors.length)?p.colors[0]:"",quantities:{}}];
  renderColorRows();
}

function renderOrderSizes(){
  $("orderSizeTags").innerHTML = orderSizes.map(s=>`<span class="size-tag">${s}<span class="del-size" onclick="removeOrderSize('${s}')">×</span></span>`).join("");
}

function removeOrderSize(size){
  orderSizes = orderSizes.filter(s=>s!==size);
  orderColorRows.forEach(row=>{ delete row.quantities[size]; });
  renderOrderSizes(); renderColorRows();
}

function addColorRow(){
  orderColorRows.push({color:"",quantities:{}});
  renderColorRows();
}

function removeColorRow(index){
  orderColorRows.splice(index,1);
  renderColorRows();
}

function renderColorRows(){
  const p = getProduct($("orderProduct").value);
  const presetColors = p?p.colors||[]:[];
  $("orderColorConfigs").innerHTML = orderColorRows.map((row,i)=>`
    <div class="color-row">
      <div class="color-label">
        <span>颜色${i+1}</span>
        <button class="btn-small btn-red" onclick="removeColorRow(${i})" ${orderColorRows.length<=1?'disabled':''}>删除</button>
      </div>
      <input list="colorPreset${i}" value="${esc(row.color)}" onchange="orderColorRows[${i}].color=this.value" placeholder="输入或选择颜色">
      <datalist id="colorPreset${i}">${presetColors.map(c=>`<option value="${esc(c)}">`).join("")}</datalist>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
        ${orderSizes.map(s=>`
          <div style="flex:1;min-width:50px">
            <label style="font-size:12px;text-align:center">${s}</label>
            <input type="number" value="${row.quantities[s]||""}" placeholder="0" onchange="orderColorRows[${i}].quantities['${s}']=safeNumber(this.value)" style="margin:2px 0;padding:8px">
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

function createOrderV5(){
  const code = $("orderProduct").value;
  if(!code){ alert("请选择货号"); return; }
  const colorConfigs = orderColorRows.filter(r=>r.color.trim());
  if(!colorConfigs.length){ alert("请至少填写一个颜色"); return; }
  let total = 0;
  colorConfigs.forEach(cc=>{ Object.values(cc.quantities||{}).forEach(v=>total+=safeNumber(v)); });
  if(total<=0){ alert("请填写尺码数量"); return; }
  if(!getBoms(code).length){ alert("该货号还没有物料 BOM，请先去添加物料"); return; }
  data.orders.push(createOrderObjectV5(code,orderSizes,colorConfigs));
  saveData(); resetOrderForm(); renderAll();
  alert("指令单创建成功"); showPage("orders");
}

// ---------- 其余页面渲染（与V4兼容） ----------
function renderSelects(){
  const opts = data.products.map(p=>`<option value="${esc(p.code)}">${esc(p.code)} - ${esc(p.name)}</option>`).join("");
  $("orderProduct").innerHTML = opts; $("bomProduct").innerHTML = opts;
  $("stockMaterial").innerHTML = data.stocks.map((s,i)=>`<option value="${i}">${esc(s.name)} / ${esc(s.spec)}</option>`).join("");
  $("stockOrder").innerHTML = [`<option value="">不关联</option>`].concat(data.orders.filter(o=>o.status==="active").map(o=>`<option value="${esc(o.id)}">${esc(o.id)} - ${esc(o.product_name)}</option>`)).join("");
}

function renderHome(){
  $("homeActiveCount").innerText = data.orders.filter(o=>o.status==="active").length;
  $("homeWarnCount").innerText = getPurchaseSummary().reduce((s,x)=>s+(x.need_order>0?1:0),0);
  $("homeOrders").innerHTML = data.orders.slice().reverse().slice(0,5).map(orderCard).join("")||`<div class="empty">暂无</div>`;
}

function orderCard(o){
  return `<div class="item" onclick="openOrder('${esc(o.id)}')">
    <div class="item-head"><b>${esc(o.id)}</b>${o.status==="completed"?'<span class="tag ok">完成</span>':o.status==="cancelled"?'<span class="tag gray">取消</span>':'<span class="tag '+(o.warning_count?'warn':'ok')+'">'+(o.warning_count?'待处理':'齐套')+'</span>'}</div>
    ${esc(o.code)} ${esc(o.product_name)} · ${o.total_qty}件 · ${o.ready_rate||0}%
  </div>`;
}

function renderOrders(){
  const f=$("orderFilter").value; let list=data.orders.slice().reverse();
  if(f!=="all") list=list.filter(o=>o.status===f);
  $("orderList").innerHTML = list.map(orderCard).join("")||`<div class="empty">暂无</div>`;
}

function openOrder(id){
  const o=data.orders.find(x=>x.id===id); if(!o) return;
  const mRows = (o.materials||[]).map(m=>`<tr><td>${esc(m.name)}<br><span class="sub">${esc(m.spec)}</span></td><td>${m.total_need}</td><td>${m.remain_need}</td><td>${m.current_stock}</td><td>${m.ordered_on_way}</td><td>${m.need_order}</td><td><span class="tag ${m.cls}">${m.status}</span></td></tr>`).join("");
  $("detailBox").innerHTML = `<div class="card"><div class="title">${esc(o.id)} <button class="btn-small btn-gray" onclick="showPage('orders')">返回</button></div>
    ${esc(o.code)} - ${esc(o.product_name)} · 总件数${o.total_qty}<br>尺码: ${(o.sizes||[]).join("/")}<br>
    ${(o.colorConfigs||[]).map(c=>`${c.color}: ${Object.values(c.quantities||{}).reduce((a,b)=>a+safeNumber(b),0)}件`).join(" | ")}<br>
    齐套率${o.ready_rate||0}% 预警${o.warning_count||0}
    <hr><button class="btn-green btn-small" onclick="setStatus('${o.id}','completed')">完成</button>
    <button class="btn-orange btn-small" onclick="setStatus('${o.id}','active')">恢复</button>
    <button class="btn-gray btn-small" onclick="setStatus('${o.id}','cancelled')">取消</button>
    <button class="btn-red btn-small" onclick="deleteOrder('${o.id}')">删除</button></div>
    <div class="card"><div class="title">物料明细</div><div class="table-wrap"><table class="table"><tr><th>物料</th><th>总需</th><th>剩余</th><th>库存</th><th>在途</th><th>还需</th><th>状态</th></tr>${mRows}</table></div></div>`;
  showPage("detail");
}
function setStatus(id,s){ const o=data.orders.find(x=>x.id===id); if(o){o.status=s;saveData();renderAll();openOrder(id);} }

function stockOperation(){
  const idx=Number($("stockMaterial").value), qty=safeNumber($("stockQty").value), type=$("stockType").value, oid=$("stockOrder").value, s=data.stocks[idx];
  if(!s||qty<=0) return alert("请正确填写");
  if(type==="in"){ s.stock=Number((safeNumber(s.stock)+qty).toFixed(2)); s.onway=Math.max(0,Number((safeNumber(s.onway)-qty).toFixed(2))); }
  if(type==="out"){ if(safeNumber(s.stock)<qty) return alert("库存不足"); s.stock=Number((safeNumber(s.stock)-qty).toFixed(2)); if(oid){ const o=data.orders.find(x=>x.id===oid); if(o){o.issued=o.issued||{}; o.issued[stockKey(s.name,s.spec)]=Number((safeNumber(o.issued[stockKey(s.name,s.spec)])+qty).toFixed(2));}}}
  if(type==="onway"){ s.onway=Number((safeNumber(s.onway)+qty).toFixed(2)); }
  data.logs.push({id:uid("L"),date:new Date().toLocaleString(),name:s.name,spec:s.spec,type,qty,orderId:oid,remark:$("stockRemark").value||""});
  saveData(); $("stockQty").value=""; $("stockRemark").value=""; renderAll(); alert("操作成功");
}
